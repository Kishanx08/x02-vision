# --- HTTP BLOCK (Port 80) ---
# Redirects all traffic to HTTPS
server {
    listen 80;
    server_name vision.x02.me;
    client_max_body_size 50M;

    if ($host = vision.x02.me) {
        return 301 https://$host$request_uri;
    }

    return 404;
}

# --- HTTPS BLOCK (Port 443) ---
# Handles the Landing Page and the AI API
server {
    listen 443 ssl;
    server_name vision.x02.me;
    client_max_body_size 50M;

    # SSL Configuration (Managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/vision.x02.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vision.x02.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # 1. The Frontend (React/Next.js Landing Page)
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Internally serves the /vision route from your main app
        rewrite ^/$ /vision break;
    }

    # 2. The AI Media Moderation API (FastAPI)
    location /moderate-image {
        proxy_pass http://127.0.0.1:8000/moderate-image;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /moderate-gif {
        proxy_pass http://127.0.0.1:8000/moderate-gif;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /moderate-video {
        proxy_pass http://127.0.0.1:8000/moderate-video;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /moderate-media {
        proxy_pass http://127.0.0.1:8000/moderate-media;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /jobs/ {
        proxy_pass http://127.0.0.1:8000/jobs/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /info {
        proxy_pass http://127.0.0.1:8000/info;
        proxy_set_header Host $host;
    }

    # 3. API Health Check
    location /health {
        proxy_pass http://127.0.0.1:8000/health;
        proxy_set_header Host $host;
    }
}