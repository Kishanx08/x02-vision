# --- HTTP BLOCK (Port 80) ---
# Redirects all traffic to HTTPS
server {
    listen 80;
    server_name vision.x02.me;
    client_max_body_size 500M;

    if ($host = vision.x02.me) {
        return 301 https://$host$request_uri;
    }

    return 404;
}

# --- HTTPS BLOCK (Port 443) ---
# Handles the Media Moderation API
server {
    listen 443 ssl;
    server_name vision.x02.me;
    client_max_body_size 500M;

    # SSL Configuration (Managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/vision.x02.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vision.x02.me/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Proxy all requests to the FastAPI media moderation service
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_buffering off;

        # Timeout settings for large file uploads
        proxy_connect_timeout 30s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }
}